<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>testing - Pogo个人主页</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.3.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        /* 这是专门给文章正文排版用的一些微调样式 */
        .article-container {
            max-width: 700px; /* 文章页稍微宽一点方便阅读 */
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 25px;
            color: #4f46e5;
            font-weight: 600;
            transition: transform 0.3s ease;
        }
        .back-btn:hover {
            transform: translateX(-5px); /* 鼠标放上去有一个向左的小动画 */
        }
        .article-content {
            line-height: 1.8;
            color: #334155;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.05); /* 一条浅浅的分割线 */
        }
        /* 美化文章里的段落和图片 */
        .article-content p { margin-bottom: 15px; }
        .article-content img { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="glass-container article-container">
        
        <a href="../../index.html" class="back-btn">
            <i class="ri-arrow-left-line"></i> 返回首页
        </a>
        
        <h1 class="site-title" style="font-size: 1.8rem; margin: 0 0 10px;">testing</h1>
        <div class="post-info">
            <span><i class="ri-calendar-line"></i> 2023-07-30</span>
            <span><i class="ri-time-line"></i> 1 min read</span>
        </div>

        <div class="article-content">
            <p>这是一篇测试文章的正文。</p>
            <p>以后如果你有新的文章内容，直接写在这个 <code>&lt;div class="article-content"&gt;</code> 里面就可以啦！</p>
        </div>
        
    </div>
</body>
</html>
