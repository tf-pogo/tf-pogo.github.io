<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>高三德阳三诊成绩分析 - Pogo个人主页</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.3.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .article-container { max-width: 800px !important; margin: 0 auto !important; display: block !important; }
        .back-btn { display: inline-flex; align-items: center; gap: 5px; margin-bottom: 25px; color: #4f46e5; font-weight: 600; }
        .article-content { line-height: 1.8; color: #334155; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.05); }
        
        /* 表格与交互样式 (和绵二保持一致) */
        .score-table { width: 100%; border-collapse: collapse; margin: 25px 0; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .score-table th, .score-table td { padding: 12px 15px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .score-table th { background: rgba(79, 70, 229, 0.1); color: #4f46e5; }
        /* 🌟 学科点击按钮：去下划线 + 悬浮背景 + 深色模式适配 */
        .subject-link { 
            color: #ec4899; 
            font-weight: bold; 
            cursor: pointer; 
            text-decoration: none; 
            transition: all 0.3s ease; 
        }
        /* 鼠标悬浮时的浅色背景和圆角 */
        .subject-link:hover { 
            color: #4f46e5; 
            background: rgba(79, 70, 229, 0.1); 
            border-radius: 6px; 
            padding: 2px 8px;
        }
        /* 深色模式下的文字颜色 */
        body.dark-mode .subject-link { 
            color: #f472b6; 
        }
        /* 深色模式下的悬浮发光背景 */
        body.dark-mode .subject-link:hover { 
            color: #818cf8; 
            background: rgba(129, 140, 248, 0.2); 
        }
        
        /* 弹窗样式 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 9999; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); padding: 30px; border-radius: 20px; max-width: 400px; width: 90%; transform: translateY(20px); transition: all 0.3s ease; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        body.dark-mode .modal-content { background: rgba(30, 41, 59, 0.9); color: #f8fafc; }
        .close-btn { margin-top: 20px; display: block; width: 100%; padding: 10px; background: #4f46e5; color: white; text-align: center; border-radius: 10px; cursor: pointer; }
        .trend-up { color: #10b981; font-weight: bold; }
        .trend-down { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>
    <div class="glass-container article-container">
        <a href="../../index.html" class="back-btn"><i class="ri-arrow-left-line"></i> 返回首页</a>
        <h1 class="site-title" style="font-size: 1.8rem; margin: 0;">德阳三诊成绩复盘</h1>
        <div class="post-info"><span><i class="ri-mouse-line"></i> 点击学科查看与绵阳二诊的对比</span></div>

        <div class="article-content">
            <table class="score-table">
                <thead>
                    <tr><th>学科 (点击对比)</th><th>德三原始分</th><th>赋分成绩</th></tr>
                </thead>
                <tbody>
                    <tr><td class="subject-link" onclick="openModal('语文')">语文 👆</td><td>82</td><td>82</td></tr>
                    <tr><td class="subject-link" onclick="openModal('数学')">数学 👆</td><td>99</td><td>99</td></tr>
                    <tr><td class="subject-link" onclick="openModal('英语')">英语 👆</td><td>113</td><td>113</td></tr>
                    <tr><td class="subject-link" onclick="openModal('物理')">物理 👆</td><td>72</td><td>72</td></tr>
                    <tr><td class="subject-link" onclick="openModal('化学')">化学 👆</td><td>49</td><td>62</td></tr>
                    <tr><td class="subject-link" onclick="openModal('生物')">生物 👆</td><td>60</td><td>70</td></tr>
                </tbody>
            </table>
            <p>这次德阳三诊总分 <strong>498分</strong>，相比于之前的绵阳二诊，各科的排位和得分情况发生了不小的变动。点开上面的学科，看看这段时间的努力在哪儿见了效，哪儿又松了劲。</p>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color: #4f46e5;">轨迹分析</h2>
            <p id="modalData" style="line-height: 2;"></p>
            <div class="close-btn" onclick="closeModal()">收起</div>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color: #4f46e5; margin-top: 0;">学科全记录</h2>
            <div id="modalData" style="line-height: 1.6; margin: 15px 0;"></div>
            <div class="close-btn" onclick="closeModal()">关 闭</div>
        </div>
    </div>

    <script src="../../scripts/db.js"></script>
</body>
</html>
