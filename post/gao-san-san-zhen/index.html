<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>高三德阳三诊成绩分析 - Pogo个人主页</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.3.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* =========================================
           文章页专属 MD3 样式 (完全继承主页配色)
           ========================================= */
        .article-container { 
            max-width: 800px !important; 
            margin: 0 auto !important; 
            display: block !important; 
        }
        
        /* 返回按钮 */
        .back-btn { 
            display: inline-flex; 
            align-items: center; 
            gap: 5px; 
            margin-bottom: 25px; 
            color: var(--md-sys-color-primary); /* 调用 MD3 主色 */
            font-weight: 600; 
            text-decoration: none;
            transition: opacity 0.2s ease;
        }
        .back-btn:hover { opacity: 0.8; }
        
        /* 正文区域 */
        .article-content { 
            line-height: 1.8; 
            color: var(--md-sys-color-on-background); 
            margin-top: 30px; 
            padding-top: 20px; 
            border-top: 1px solid var(--md-sys-color-outline); 
        }
        
        /* 表格样式：使用 MD3 卡片色阶 */
        .score-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin: 25px 0; 
            border-radius: 16px; 
            overflow: hidden; 
            background-color: var(--md-sys-color-surface-container-highest);
        }
        .score-table th, .score-table td { 
            padding: 12px 15px; 
            text-align: center; 
            border-bottom: 1px solid rgba(150, 150, 150, 0.15); 
        }
        .score-table th { 
            background: var(--md-sys-color-secondary-container); 
            color: var(--md-sys-color-on-secondary-container); 
            font-weight: 600;
        }
        
        /* 🌟 学科点击按钮：终极居中对齐方案 */
        .score-table td:first-child {
            /* 第一列（学科列）强制居中其内部的所有内容 */
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(150, 150, 150, 0.15); /* 补回 Flex 导致的边框丢失 */
            height: 100%; /* 确保填满单元格 */
            min-height: 48px; /* 给一个最小高度保证点击区域舒适 */
        }

        .subject-link { 
            color: var(--md-sys-color-primary); 
            font-weight: bold; 
            cursor: pointer; 
            text-decoration: none; 
            transition: all 0.3s ease; 
            
            /* 它自己只负责保持紧凑和内部间距 */
            display: inline-flex;
            align-items: center;
            gap: 6px; 
            padding: 6px 14px; /* 稍微加宽一点左右 padding，让悬浮框更好看 */
            border-radius: 12px; /* 稍微加大一点圆角，更贴合 MD3 */
        }

        .subject-link:hover { 
            background: var(--md-sys-color-secondary-container); 
            color: var(--md-sys-color-on-secondary-container); 
        }
        
        
        /* 弹窗样式 MD3 改造 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 9999; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { 
            background: var(--md-sys-color-surface-container); 
            color: var(--md-sys-color-on-background);
            padding: 30px; 
            border-radius: 28px; /* MD3 标准大圆角 */
            max-width: 400px; 
            width: 90%; 
            transform: translateY(20px); 
            transition: all 0.3s ease; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .close-btn { 
            margin-top: 20px; 
            display: block; 
            width: 100%; 
            padding: 12px; 
            background: var(--md-sys-color-primary); 
            color: var(--md-sys-color-on-primary); 
            text-align: center; 
            border-radius: 999px; /* MD3 药丸按钮 */
            cursor: pointer; 
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="glass-container article-container">
        <a href="../../index.html" class="back-btn"><i class="ri-arrow-left-line"></i> 返回首页</a>
        <h1 class="site-title" style="font-size: 1.8rem; margin: 0;">德阳三诊成绩复盘</h1>
        <div class="post-info"><span><i class="ri-mouse-line"></i> 点击学科查看与绵阳二诊的对比</span></div>

        <div class="article-content">
            <table class="score-table">
                <thead>
                    <tr><th>学科 (点击对比)</th><th>德三原始分</th><th>赋分成绩</th></tr>
                </thead>
                <tbody>
                    <tr><td class="subject-link" onclick="openModal('语文')">语文 👆</td><td>82</td><td>82</td></tr>
                    <tr><td class="subject-link" onclick="openModal('数学')">数学 👆</td><td>99</td><td>99</td></tr>
                    <tr><td class="subject-link" onclick="openModal('英语')">英语 👆</td><td>113</td><td>113</td></tr>
                    <tr><td class="subject-link" onclick="openModal('物理')">物理 👆</td><td>72</td><td>72</td></tr>
                    <tr><td class="subject-link" onclick="openModal('化学')">化学 👆</td><td>49</td><td>62</td></tr>
                    <tr><td class="subject-link" onclick="openModal('生物')">生物 👆</td><td>60</td><td>70</td></tr>
                </tbody>
            </table>
            <p>这次德阳三诊总分 <strong>498分</strong>，相比于之前的绵阳二诊，各科的排位和得分情况发生了不小的变动。点开上面的学科，看看这段时间的努力在哪儿见了效，哪儿又松了劲。</p>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color: #4f46e5;">轨迹分析</h2>
            <p id="modalData" style="line-height: 2;"></p>
            <div class="close-btn" onclick="closeModal()">收起</div>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color: #4f46e5; margin-top: 0;">学科全记录</h2>
            <div id="modalData" style="line-height: 1.6; margin: 15px 0;"></div>
            <div class="close-btn" onclick="closeModal()">关 闭</div>
        </div>
    </div>

    <script src="../../scripts/db.js"></script>
</body>
</html>
