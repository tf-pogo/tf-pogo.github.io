   <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        // 1. 网页加载时，检查记忆
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            themeToggle.setAttribute('data-tooltip', '点击切换浅色模式');
        }

        // 2. 核心切换功能函数
        function toggleTheme() {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                themeToggle.setAttribute('data-tooltip', '点击切换浅色模式');
            } else {
                localStorage.setItem('theme', 'light');
                themeToggle.setAttribute('data-tooltip', '点击切换深色模式');
            }
        }

        // 3. 点击头像触发超酷动画
        themeToggle.addEventListener('click', (e) => {
            // 检查浏览器是否支持这个高级动画 API (如果不支持，就瞬间切换)
            if (!document.startViewTransition) {
                toggleTheme();
                return;
            }

            // 获取你头像所在的精准坐标中心点
            const rect = themeToggle.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;

            // 计算圆需要扩散的最大半径（到屏幕最远角落的距离）
            const endRadius = Math.hypot(
                Math.max(x, innerWidth - x),
                Math.max(y, innerHeight - y)
            );

            // 让浏览器给当前屏幕拍个照，然后执行切换
            const transition = document.startViewTransition(() => {
                toggleTheme();
            });

            // 当新主题准备好时，执行从头像向外扩散的圆形裁切动画！
            transition.ready.then(() => {
                document.documentElement.animate(
                    {
                        clipPath: [
                            `circle(0px at ${x}px ${y}px)`,
                            `circle(${endRadius}px at ${x}px ${y}px)`
                        ]
                    },
                    {
                        duration: 600,            // 动画持续时间（毫秒），600ms很舒服
                        easing: 'ease-in-out',    // 动画节奏（慢进慢出）
                        pseudoElement: '::view-transition-new(root)' // 指定让新页面来扩散
                    }
                );
            });
        });
    </script>
