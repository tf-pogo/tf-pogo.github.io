<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pogo个人主页</title>
    <link rel="shortcut icon" href="https://tf-pogo.github.io/favicon.ico?v=1723015263149">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.3.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #6366f1;
            --card-shadow: 0 8px 32px rgba(31, 38, 135, 0.05);
        }

        body {
            background: #f1f5f9;
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
        }

        .main {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .main-content {
            max-width: 720px;
            width: 100%;
        }

        /* 核心高斯模糊卡片 */
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: var(--card-shadow);
            animation: fadeIn 0.8s ease-out;
        }

        /* 头部设计 */
        .site-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .avatar:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .site-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 15px 0 8px;
            background: linear-gradient(90deg, #4f46e5, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .site-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* 导航菜单 */
        .menu-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .menu {
            background: rgba(255, 255, 255, 0.6);
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .menu:hover {
            background: var(--accent-color);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.2);
        }

        /* 文章卡片列表 */
        .post-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .post {
            background: rgba(255, 255, 255, 0.3);
            padding: 20px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s;
        }

        .post:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: scale(1.02);
            border-color: var(--accent-color);
        }

        .post a {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .post-title {
            margin: 0 0 8px;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .post-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            gap: 15px;
        }

        /* 社交图标 */
        .social-container {
            margin-top: 20px;
        }

        .social-container a {
            color: var(--text-secondary);
            font-size: 1.5rem;
            margin: 0 12px;
            transition: 0.3s;
        }

        .social-container a:hover {
            color: var(--accent-color);
            transform: translateY(-3px);
        }

        /* 版权信息 */
        .site-footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .glass-container { padding: 30px 20px; }
            .site-title { font-size: 1.5rem; }
        }
    </style>
</head>
