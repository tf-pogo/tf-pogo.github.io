<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Pogo 的标签云 — 按标签浏览文章" />
    <title>标签 - Pogo个人主页</title>

    <link rel="stylesheet" href="../styles/main.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.3.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        .tags-container { max-width: 700px; }
        .back-btn { display: inline-flex; align-items: center; gap: 5px; margin-bottom: 25px; color: #4f46e5; font-weight: 600; transition: transform 0.3s ease; }
        .back-btn:hover { transform: translateX(-5px); }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }
        .tag-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 50px;
            background: rgba(79, 70, 229, 0.08);
            color: #4f46e5;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(79, 70, 229, 0.15);
        }
        .tag-pill:hover {
            background: #4f46e5;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        .tag-pill .count {
            font-size: 0.8rem;
            opacity: 0.7;
        }
        .tag-section { margin-bottom: 35px; }
        .tag-section h3 { font-size: 1.1rem; color: #1e293b; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .empty-hint { color: #94a3b8; text-align: center; padding: 40px 0; font-size: 1.05rem; }
    </style>
</head>
<body>
    <div class="glass-container tags-container">

        <a href="../index.html" class="back-btn">
            <i class="ri-arrow-left-line"></i> 返回首页
        </a>

        <h1 class="site-title" style="font-size: 1.8rem; margin: 0 0 5px;">标签</h1>
        <p style="color: #64748b; margin-bottom: 25px;">按标签浏览感兴趣的内容 🏷️</p>

        <div class="tag-section">
            <h3><i class="ri-price-tag-3-line" style="color: #4f46e5;"></i> 所有标签</h3>
            <div class="tag-cloud">
                <a href="../post/mian-yang-er-zhen/index.html" class="tag-pill">
                    成绩复盘 <span class="count">4</span>
                </a>
                <a href="../post/wu-yue-mo-kao/index.html" class="tag-pill">
                    高考冲刺 <span class="count">4</span>
                </a>
                <a href="../post/cheng-du-san-zhen/index.html" class="tag-pill">
                    数据分析 <span class="count">4</span>
                </a>
            </div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <p style="color: #94a3b8; font-size: 0.9rem;">✨ 更多标签将在新文章中陆续添加</p>
        </div>

    </div>
</body>
</html>
